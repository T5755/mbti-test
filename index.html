<!DOCTYPE html>
<html lang="zh-CN" data-theme="system">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" id="meta-theme-color" content="#f4f5fb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>MBTI 人格测试 · 28 题看清你是谁</title>
  <meta name="description" content="28 道精选题目，3 分钟测出你的 MBTI 十六型人格。免费、即时、可分享。" />
  <meta property="og:title" content="MBTI 人格测试 · 28 题看清你是谁" />
  <meta property="og:description" content="28 道精选题目，3 分钟测出你的十六型人格，免费可分享。" />
  <meta property="og:type" content="website" />
  <!-- 纯系统字体：零外部依赖，国内网络秒开，不依赖任何 CDN -->
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <!-- 动态背景光斑 -->
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">MBTI<span class="brand-dot">·</span>测试</span>
    </div>

    <div class="theme-switch" role="group" aria-label="主题切换">
      <button class="theme-btn" data-set-theme="light" aria-label="浅色主题" title="浅色">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <button class="theme-btn" data-set-theme="dark" aria-label="深色主题" title="深色">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
      <button class="theme-btn" data-set-theme="system" aria-label="跟随系统" title="跟随系统">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M8 20h8M12 16v4"/></svg>
      </button>
    </div>
  </header>

  <main class="stage">
    <!-- 第一屏：首页 -->
    <section id="screen-intro" class="screen is-active" aria-labelledby="intro-title">
      <div class="intro-card glass">
        <p class="eyebrow">FREE · 3 MINUTES</p>
        <h1 id="intro-title" class="intro-title">28 题，<br/>看清你的人格底色</h1>
        <p class="intro-sub">基于 MBTI 四维模型（外向/内向、实感/直觉、思考/情感、判断/感知），用 28 道日常情境题，帮你找到最贴合的十六型人格，并给出可落地的自我认知建议。</p>
        <ul class="intro-points">
          <li><span class="dot"></span>无需注册，作答即出结果</li>
          <li><span class="dot"></span>四维度占比可视化</li>
          <li><span class="dot"></span>一键复制，分享给朋友</li>
        </ul>
        <button id="start-btn" class="btn btn-primary magnetic" type="button">开始测试</button>
        <p class="intro-note">本测试用于自我探索与趣味参考，不构成心理诊断。</p>
      </div>
    </section>

    <!-- 第二屏：测试 -->
    <section id="screen-test" class="screen" aria-labelledby="test-title" hidden>
      <div class="test-card glass">
        <div class="test-head">
          <span class="test-counter" id="test-counter" aria-live="polite">第 1 / 28 题</span>
          <span class="test-dim" id="test-dim" aria-hidden="true"></span>
        </div>
        <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="28" aria-valuenow="0" id="progress-bar" aria-label="测试进度">
          <span class="progress-fill" id="progress-fill"></span>
        </div>

        <h2 class="test-question" id="test-question" aria-live="polite">题目加载中…</h2>

        <div class="scale" id="scale" role="radiogroup" aria-label="同意程度">
          <button class="scale-opt" type="button" role="radio" aria-checked="false" data-value="1"><span class="scale-num">1</span><span class="scale-label">非常不符合</span></button>
          <button class="scale-opt" type="button" role="radio" aria-checked="false" data-value="2"><span class="scale-num">2</span><span class="scale-label">不太符合</span></button>
          <button class="scale-opt" type="button" role="radio" aria-checked="false" data-value="3"><span class="scale-num">3</span><span class="scale-label">中立</span></button>
          <button class="scale-opt" type="button" role="radio" aria-checked="false" data-value="4"><span class="scale-num">4</span><span class="scale-label">比较符合</span></button>
          <button class="scale-opt" type="button" role="radio" aria-checked="false" data-value="5"><span class="scale-num">5</span><span class="scale-label">非常符合</span></button>
        </div>

        <div class="test-actions">
          <button id="prev-btn" class="btn btn-ghost" type="button" disabled>上一题</button>
          <button id="next-btn" class="btn btn-primary magnetic" type="button" disabled>下一题</button>
        </div>
      </div>
    </section>

    <!-- 第三屏：结果 -->
    <section id="screen-result" class="screen" aria-labelledby="result-title" hidden>
      <div class="result-card glass">
        <p class="result-eyebrow" id="result-eyebrow" aria-live="polite">你的类型是</p>
        <h2 id="result-title" class="result-type" aria-live="polite">—</h2>
        <p class="result-name" id="result-name"></p>
        <p class="result-tagline" id="result-tagline"></p>
        <p class="result-desc" id="result-desc"></p>

        <div class="dims" id="dims" aria-label="四维度占比"></div>

        <div class="result-cols">
          <div class="result-col">
            <h3 class="col-title">你的优势</h3>
            <ul class="tag-list" id="strengths"></ul>
          </div>
          <div class="result-col">
            <h3 class="col-title">成长空间</h3>
            <ul class="tag-list" id="growth"></ul>
          </div>
        </div>

        <div class="result-field">
          <h3 class="col-title">可能适合的方向</h3>
          <ul class="tag-list tag-list-soft" id="fields"></ul>
        </div>

        <div class="result-actions">
          <button id="copy-btn" class="btn btn-primary magnetic" type="button">复制结果</button>
          <button id="retest-btn" class="btn btn-ghost" type="button">重新测试</button>
        </div>
        <p class="copy-hint" id="copy-hint" aria-live="polite"></p>
      </div>
    </section>

    <!-- 分析中过渡 -->
    <div id="analyzing" class="analyzing" hidden>
      <div class="spinner" aria-hidden="true"></div>
      <p>正在分析你的人格画像…</p>
    </div>
  </main>

  <footer class="footnote">
    <span>MBTI 趣味测试 · 仅供参考</span>
  </footer>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
